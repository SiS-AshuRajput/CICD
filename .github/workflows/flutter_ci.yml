name: Flutter CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      build_mode:
        description: "Build mode (debug or release)"
        required: false
        default: "release"

jobs:
  # -------------------- TEST --------------------
  validating_code:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test

  # -------------------- BUILD --------------------
  generating_apk:
    needs: validating_code
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      # Decode keystore ONLY for release
      - name: Decode keystore
        if: github.event.inputs.build_mode != 'debug'
        run: |
          mkdir -p android/app/keystore
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/keystore/cicd.jks

      - run: flutter pub get

      - name: Build APK
        shell: bash
        run: |
          BUILD_MODE="${{ github.event.inputs.build_mode || 'release' }}"
          if [ "$BUILD_MODE" = "debug" ]; then
            flutter build apk --debug
          else
            flutter build apk --release
          fi
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: build/app/outputs/flutter-apk/*.apk

  # -------------------- FIREBASE DISTRIBUTION --------------------
  firebase_distribution:
    needs: generating_apk
    runs-on: ubuntu-latest

    # Run for:
    # - release on main
    # - debug when manually triggered
    if: github.ref == 'refs/heads/main' || github.event.inputs.build_mode == 'debug'

    steps:
      - uses: actions/checkout@v4

      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: apk
          path: apk

      - name: Verify APK exists
        run: ls -la apk

      # 🚀 RELEASE → Firebase
      - name: Upload RELEASE to Firebase
        if: github.event.inputs.build_mode != 'debug'
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: 1:366366010322:android:aca1016c99d2367852760b
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          groups: releasetesters
          file: apk/app-release.apk

      # 🧪 DEBUG → Firebase
      - name: Upload DEBUG to Firebase
        if: github.event.inputs.build_mode == 'debug'
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: 1:366366010322:android:aca1016c99d2367852760b
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          groups: debugtesters
          file: apk/app-debug.apk

      # -------------------- ZOHO FLOW NOTIFICATION --------------------
      - name: Notify Zoho Flow
        run: |
          BUILD_MODE="${{ github.event.inputs.build_mode || 'release' }}"
          APK_FILE=""
          if [ "$BUILD_MODE" = "debug" ]; then
            APK_FILE="apk/app-debug.apk"
          else
            APK_FILE="apk/app-release.apk"
          fi

          curl -X POST "${{ secrets.ZOHO_FLOW_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{
              "app_name": "MyCiCdApp",
              "version": "'"${GITHUB_SHA}"'",
              "build_mode": "'"$BUILD_MODE"'",
              "apk_url": "'"$APK_FILE"'",
              "branch": "'"${GITHUB_REF}"'"
            }'